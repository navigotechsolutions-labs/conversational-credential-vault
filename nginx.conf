# Host Nginx Configuration Block for core.navigotechsolutions.com
# Save this in your Nginx sites-available directory and link it to sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name core.navigotechsolutions.com;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name core.navigotechsolutions.com;

    # Certbot will automatically uncomment and populate these when you run:
    # sudo certbot --nginx -d core.navigotechsolutions.com
    #
    # ssl_certificate /etc/letsencrypt/live/core.navigotechsolutions.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/core.navigotechsolutions.com/privkey.pem;

    # Recommended SSL settings for high security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA256:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (uncomment once SSL is successfully configured and working)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # Proxy to Frontend Container
    location / {
        proxy_pass http://127.0.0.1:8380;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy to Backend API
    location /api {
        proxy_pass http://127.0.0.1:8333;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase limit size to allow backups up to 20MB
        client_max_body_size 20M;
        
        # Increase timeouts for slow backup uploads/LLM completions
        proxy_read_timeout 300s;
        proxy_connect_timeout 300s;
    }
}
